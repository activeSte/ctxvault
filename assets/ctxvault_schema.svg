<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&amp;display=swap');
      text { font-family: 'JetBrains Mono', monospace; }

      .flow  { stroke-dasharray: 8 4; animation: flow 1.4s linear infinite 0.00s; }
      .flow2 { stroke-dasharray: 8 4; animation: flow 1.4s linear infinite 0.28s; }
      .flow3 { stroke-dasharray: 8 4; animation: flow 1.4s linear infinite 0.56s; }
      .flow4 { stroke-dasharray: 8 4; animation: flow 1.4s linear infinite 0.84s; }
      .flow5 { stroke-dasharray: 8 4; animation: flow 1.4s linear infinite 1.12s; }
      .flowb  { stroke-dasharray: 4 4; animation: flowup 1.8s linear infinite 0.00s; }
      .flowb2 { stroke-dasharray: 4 4; animation: flowup 1.8s linear infinite 0.6s; }
      .flowb3 { stroke-dasharray: 4 4; animation: flowup 1.8s linear infinite 1.2s; }

      @keyframes flow {
        from { stroke-dashoffset: 12; }
        to   { stroke-dashoffset: 0; }
      }
      @keyframes flowup {
        from { stroke-dashoffset: 0; }
        to   { stroke-dashoffset: 16; }
      }

      .blocked { opacity: 0.6; }
    </style>

    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0.5 L0,6.5 L6.5,3.5 Z" fill="context-stroke"/>
    </marker>
  </defs>

  <rect width="900" height="400" rx="14" fill="#f5f4f0"/>

  <!-- Section labels vertical -->
  <text x="18" y="80"  fill="#a8a5a0" font-size="8" font-weight="500" letter-spacing="0.16em" transform="rotate(-90,18,80)">AGENTS</text>
  <text x="18" y="252" fill="#a8a5a0" font-size="8" font-weight="500" letter-spacing="0.16em" transform="rotate(-90,18,252)">VAULTS</text>
  <text x="18" y="355" fill="#a8a5a0" font-size="8" font-weight="500" letter-spacing="0.16em" transform="rotate(-90,18,355)">HUMAN</text>

  <!-- AGENTS -->
  <rect x="60"  y="48" width="192" height="56" rx="8" fill="#fff" stroke="#dddbd6" stroke-width="1.5"/>
  <text x="156" y="72" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="500">agent-a</text>
  <text x="156" y="90" text-anchor="middle" fill="#bbb" font-size="8.5">research</text>

  <rect x="350" y="48" width="192" height="56" rx="8" fill="#fff" stroke="#dddbd6" stroke-width="1.5"/>
  <text x="446" y="72" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="500">agent-b</text>
  <text x="446" y="90" text-anchor="middle" fill="#bbb" font-size="8.5">customer-facing</text>

  <rect x="640" y="48" width="192" height="56" rx="8" fill="#fff" stroke="#dddbd6" stroke-width="1.5"/>
  <text x="736" y="72" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="500">agent-c</text>
  <text x="736" y="90" text-anchor="middle" fill="#bbb" font-size="8.5">coordinator</text>

  <!-- VAULTS -->
  <rect x="60"  y="196" width="192" height="88" rx="8" fill="#fff" stroke="#c8c8c4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="156" y="222" text-anchor="middle" fill="#1a1a1a" font-size="10.5" font-weight="600">agent-a-vault</text>
  <rect x="110" y="230" width="92" height="16" rx="3" fill="#1a1a1a"/>
  <text x="156" y="241" text-anchor="middle" fill="#f5f4f0" font-size="7.5" font-weight="600" letter-spacing="0.1em">RESTRICTED</text>
  <text x="156" y="272" text-anchor="middle" fill="#c0bfbb" font-size="8">agent-a only</text>

  <rect x="350" y="196" width="192" height="88" rx="8" fill="#fff" stroke="#c8c8c4" stroke-width="1.5"/>
  <text x="446" y="222" text-anchor="middle" fill="#1a1a1a" font-size="10.5" font-weight="600">shared-vault</text>
  <rect x="400" y="230" width="84" height="16" rx="3" fill="#eceae6" stroke="#d8d6d0" stroke-width="1"/>
  <text x="442" y="241" text-anchor="middle" fill="#999" font-size="7.5" font-weight="600" letter-spacing="0.1em">PUBLIC</text>
  <text x="446" y="272" text-anchor="middle" fill="#c0bfbb" font-size="8">all agents</text>

  <rect x="640" y="196" width="192" height="88" rx="8" fill="#fff" stroke="#c8c8c4" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="736" y="222" text-anchor="middle" fill="#1a1a1a" font-size="10.5" font-weight="600">agent-c-vault</text>
  <rect x="686" y="230" width="92" height="16" rx="3" fill="#1a1a1a"/>
  <text x="736" y="241" text-anchor="middle" fill="#f5f4f0" font-size="7.5" font-weight="600" letter-spacing="0.1em">RESTRICTED</text>
  <text x="736" y="272" text-anchor="middle" fill="#c0bfbb" font-size="8">agent-c only</text>

  <!-- CONNECTIONS agent to vault -->
  <line x1="156" y1="104" x2="156" y2="194"
        stroke="#4a9e6b" stroke-width="1.5" marker-end="url(#arr)" class="flow"/>
  <path d="M 252 76 L 310 76 L 310 155 L 370 155 L 370 196"
        fill="none" stroke="#4a9e6b" stroke-width="1.5" marker-end="url(#arr)" class="flow2"/>
  <line x1="446" y1="104" x2="446" y2="194"
        stroke="#4a9e6b" stroke-width="1.5" marker-end="url(#arr)" class="flow3"/>
  <line x1="736" y1="104" x2="736" y2="194"
        stroke="#4a9e6b" stroke-width="1.5" marker-end="url(#arr)" class="flow4"/>
  <path d="M 640 76 L 582 76 L 582 155 L 522 155 L 522 196"
        fill="none" stroke="#4a9e6b" stroke-width="1.5" marker-end="url(#arr)" class="flow5"/>

  <!-- B to agent-a-vault BLOCKED -->
  <path d="M 350 76 L 320 76 L 320 130 L 220 130 L 220 194"
        fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3"
        marker-end="url(#arr)" class="blocked"/>
  <circle cx="270" cy="130" r="12" fill="#f5f4f0" stroke="#e8c0bc" stroke-width="1.2"/>
  <text x="270" y="135" text-anchor="middle" fill="#c0392b" font-size="14" font-weight="700">&#x2715;</text>

  <!-- HUMAN LAYER rail -->
  <line x1="60" y1="336" x2="840" y2="336" stroke="#d0cec8" stroke-width="1.5"/>

  <!-- CLI lines flowing upward (from rail toward vault) -->
  <line x1="156" y1="331" x2="156" y2="286"
        stroke="#5ba3c9" stroke-width="1.2" class="flowb"/>
  <line x1="446" y1="331" x2="446" y2="286"
        stroke="#5ba3c9" stroke-width="1.2" class="flowb2"/>
  <line x1="736" y1="331" x2="736" y2="286"
        stroke="#5ba3c9" stroke-width="1.2" class="flowb3"/>

  <!-- rail dots — original neutral color -->
  <circle cx="156" cy="336" r="5" fill="#f5f4f0" stroke="#c0beb8" stroke-width="1.5"/>
  <circle cx="446" cy="336" r="5" fill="#f5f4f0" stroke="#c0beb8" stroke-width="1.5"/>
  <circle cx="736" cy="336" r="5" fill="#f5f4f0" stroke="#c0beb8" stroke-width="1.5"/>

  <!-- CLI labels under dots -->
  <text x="156" y="354" text-anchor="middle" fill="#bbb" font-size="7.5" font-weight="500">CLI</text>
  <text x="446" y="354" text-anchor="middle" fill="#bbb" font-size="7.5" font-weight="500">CLI</text>
  <text x="736" y="354" text-anchor="middle" fill="#bbb" font-size="7.5" font-weight="500">CLI</text>

</svg>
